# Azazel-Zero First-Minute Control dnsmasq profile
# Copy to /etc/azazel-zero/dnsmasq-first_minute.conf

domain-needed
bogus-priv
no-resolv
log-queries=extra
log-facility=/var/log/azazel-dnsmasq.log
cache-size=256

# インターフェース束縛（重要：usb0がアップしていることが前提）
interface=usb0
listen-address=10.55.0.10
bind-interfaces

# DHCP for usb0 (Azazel-Zero inside LAN)
dhcp-range=10.55.0.50,10.55.0.200,255.255.255.0,12h
dhcp-option=option:router,10.55.0.10
dhcp-option=option:dns-server,10.55.0.10

# DHCP リース時間（デフォルト 12h、クライアント要求時間下限 3m）
dhcp-leasefile=/var/lib/dnsmasq/dnsmasq.leases
dhcp-option=option:lease-time,43200

# Upstream resolvers (overridden via config if needed)
server=9.9.9.9
server=1.1.1.1

# Block obvious DoH endpoints by name
address=/cloudflare-dns.com/0.0.0.0
address=/dns.google/0.0.0.0
address=/doh.opendns.com/0.0.0.0
address=/dns.quad9.net/0.0.0.0

# Log all interactions
log-dhcp
